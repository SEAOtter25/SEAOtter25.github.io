<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F6F7F7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: #594545;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 1rem;
            color: #594545;
            margin-bottom: 5px;
        }

        input[type="text"], input[type="password"] {
            width: 250px;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #594545;
            border-radius: 5px;
            background-color: #D0E1EE;
            font-size: 1rem;
            color: #594545;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #594545;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            color: #594545;
            background-color: #D0E1EE;
            border: 2px solid #594545;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px; /* เพิ่มระยะห่างด้านบนของปุ่ม */
        }

        button:hover {
            background-color: #81AFCF;
            color: #F6F7F7;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>LOGIN</h1>
        <form onsubmit="return validateLogin(event)">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">OK</button>
        </form>
    </div>

    <script>
        function validateLogin(event) {
            event.preventDefault(); // ป้องกันการรีเฟรชหน้า
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'Admin' && password === 'Admin1234') {
                window.location.href = '2Inventory.html'; // เปลี่ยนหน้าไปยัง 2Inventory.html
            } else {
                alert('รหัสผู้ใช้งานไม่ถูกต้อง'); // แจ้งเตือนเมื่อข้อมูลไม่ถูกต้อง
            }
        }
    </script>   
</body>
</html>
